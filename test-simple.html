<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 - 간단한 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header class="bg-blue-500 text-white p-4 fixed top-0 w-full">
        <h1>김개발 포트폴리오</h1>
    </header>

    <main class="pt-20">
        <section class="py-20 bg-gray-100">
            <div class="max-w-5xl mx-auto px-4">
                <h2 class="text-4xl font-bold mb-4">자기소개</h2>
                <p class="text-lg">사용자 중심의 웹 애플리케이션을 개발하는 풀스택 개발자입니다.</p>
                <p class="mt-4"><strong>국적:</strong> 대한민국</p>
                <p><strong>언어:</strong> 한국어 (원어민), 영어 (비즈니스 레벨)</p>
            </div>
        </section>

        <section class="py-20 bg-white">
            <div class="max-w-5xl mx-auto px-4">
                <h2 class="text-4xl font-bold mb-4">경력사항</h2>
                <p class="text-lg">테크스타트업 - 시니어 프론트엔드 개발자 (2022~현재)</p>
            </div>
        </section>

        <section class="py-20 bg-gray-100">
            <div class="max-w-5xl mx-auto px-4">
                <h2 class="text-4xl font-bold mb-4">기술스택</h2>
                <p class="text-lg">React, JavaScript, Python, Node.js 등</p>
            </div>
        </section>
    </main>
</body>
</html>
